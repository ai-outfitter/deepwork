summary: "Schema for DeepWork job.yml files that define multi-step AI agent workflows."

instructions: |
  job.yml files define multi-step workflows executed by AI agents. Each job has a shared
  data vocabulary (step_arguments), one or more named workflows, and steps with explicit
  input/output data flow. The JSON schema enforces structure; these requirements enforce
  quality and coherence that structural validation cannot catch.

  Key concepts:
  - step_arguments are the data bus — every piece of data flowing between steps is declared here
  - Workflows are the execution unit — agents start workflows, not steps
  - common_job_info is prepended to every step AND every review prompt automatically
  - Reviews cascade from three sources: step output review, step_argument review, .deepreview rules

json_schema_path: "job.schema.json"

matchers:
  - ".deepwork/jobs/*/job.yml"
  - "src/deepwork/standard_jobs/*/job.yml"
  - "library/jobs/*/job.yml"

requirements:
  actionable-summary: >
    The job `summary` MUST be written as an action describing what the job accomplishes
    (e.g., "Analyze competitors and produce a positioning report"), not as a label
    (e.g., "Competitive Research").

  data-flow-complete: >
    `step_arguments` MUST declare every piece of data that flows between steps. The
    input/output chain across steps MUST form a logical data flow: each step's inputs
    SHOULD reference outputs from earlier steps, and steps MUST NOT declare inputs that
    no prior step produces (unless provided via start_workflow). If a step produces data
    consumed by a later step, that data MUST have a corresponding step_argument.

  step-argument-descriptions-specific: >
    Each step_argument `description` MUST be specific enough for an agent to produce or
    consume the data without ambiguity. "The job.yml definition file for the new job" is
    acceptable; "A YAML file" is not.

  type-selection: >
    step_argument `type` MUST be `file_path` for artifacts that will be committed to Git
    or are too large for inline strings (reports, configs, code). Transient data consumed
    only within the workflow (user answers, feedback, summaries, names, IDs) MUST use
    `type: string`.

  common-job-info-present: >
    Workflows with more than one step SHOULD have `common_job_info_provided_to_all_steps_at_runtime`
    providing shared context (problem domain, terminology, conventions, constraints) so that
    step instructions and review prompts do not need to repeat it.

  no-duplicated-context: >
    Step instructions MUST NOT duplicate content already in `common_job_info_provided_to_all_steps_at_runtime`.
    Content needed by multiple steps but not all SHOULD be in a referenced file, not copy-pasted.

  step-instructions-complete: >
    Each step with inline `instructions` MUST provide enough detail for an agent to execute
    the step without external guidance. Instructions SHOULD include: what to do, how to use
    inputs, and what good output looks like.

  every-step-has-output: >
    Every step SHOULD have at least one output. Steps that produce no outputs provide no
    reviewable artifacts and cannot pass data to subsequent steps.

  intermediate-outputs-path: >
    File outputs not meant to be persisted long-term SHOULD use `.deepwork/tmp/` paths.
    Final outputs SHOULD use descriptive names outside dot-directories. For transient
    inter-step data, see `no-temporary-files-for-transient-data`.

  review-criteria-specific: >
    Review `instructions` MUST be specific and actionable. "Verify the YAML has at least
    3 steps and each step has both inputs and outputs" is acceptable; "Check if it looks good"
    is not. Vague criteria lead to inconsistent reviews.

  review-criteria-pragmatic: >
    Review criteria MUST be pragmatic — criteria that cannot apply to a given output SHOULD
    auto-pass rather than fail. Avoid criteria that penalize steps for not doing things
    outside their scope.

  review-strategy-matches-criteria-scope: >
    The review `strategy` SHOULD match whether the criteria need to reason across the
    other changed files in the same review set. `strategy: individual` SHOULD be used
    when the focus is on each file itself and the reviewer is unlikely to need to see
    the other changed files in order to evaluate this one. A reviewer operating under
    `individual` MAY consult unchanged project files for context (imports, references,
    related code, conventions); such consultation does NOT require switching to
    `matches_together`. `strategy: matches_together` SHOULD be used when the changed
    files are likely to need to be looked at alongside each other during review.
    `strategy: individual` MUST NOT be used when any criterion is a property of the
    set of changed files as a whole (e.g., coverage across the set, deduplication of
    the set, cross-file consistency, set-level minimality), because it forces each
    spawned reviewer to redo the cross-file scan N times and multiplies latency
    without improving review quality.

  review-no-redundant-context: >
    Review `instructions` MUST NOT repeat domain context already in `common_job_info` since
    the framework automatically prepends it to review prompts.

  process-requirements-rfc2119: >
    `process_requirements` values MUST use RFC 2119 keywords (MUST, SHOULD, MAY, SHALL,
    RECOMMENDED). These are evaluated against the agent's work_summary, so they MUST
    describe process expectations, not output format.

  workflow-summary-actionable: >
    Each workflow `summary` MUST be concise (under 200 characters) and describe what the
    workflow accomplishes, helping agents pick the right workflow when a job has multiple.

  sub-workflow-coherence: >
    Steps using `sub_workflow` MUST NOT also have `instructions`. Cross-job sub_workflow
    references (with `workflow_job`) SHOULD only be used when the target job is expected
    to be available at runtime.

  succinctness: >
    Job definitions MUST be succinct. Step instructions SHOULD contain only what the agent
    needs to act — not philosophy, and not quality criteria already enforced by the workflow
    runtime.

  prefer-deepschemas-for-file-validation: >
    Step_argument `review` blocks and step `process_requirements` SHOULD only enforce
    requirements that are process-related (e.g., "user MUST be consulted before proceeding")
    or that apply to files too varied or ad-hoc for a reusable schema. If a step_argument
    of type `file_path` produces files with a standardized, recurring structure (e.g.,
    YAML configs, JSON schemas, markdown templates with a known format), the job author
    SHOULD call `get_named_schemas` to check whether a DeepSchema already exists for
    that file type, and if so, rely on it rather than encoding requirements in the job.yml
    review block. If no schema exists and the file type would benefit from one, a
    DeepSchema SHOULD be created. When a DeepSchema exists, the inline review block
    MUST NOT duplicate its requirements and SHOULD focus only on workflow-specific
    concerns the DeepSchema cannot know — e.g., "the report MUST address the specific
    competitors identified in step 1."

  use-go-to-step-not-duplication: >
    If a later step's instructions substantially repeat behavior from an earlier step
    (e.g., "revise the job.yml" repeating the same criteria as the "define" step),
    the workflow SHOULD use `go_to_step` to revisit the earlier step instead of
    duplicating its instructions. A step that exists only to re-do prior work with
    minor tweaks MUST be replaced by navigating back to the original step with updated
    inputs or context.

  no-temporary-files-for-transient-data: >
    Step arguments MUST NOT use `type: file_path` with `.deepwork/tmp/` paths for data
    that is only consumed within the workflow and never committed to Git. Transient
    inter-step data (summaries, feedback, user answers, test observations) MUST use
    `type: string` instead. `file_path` is for artifacts that will be committed or
    that are too large for inline strings. The existence of a `.deepwork/tmp/` path
    in a step_argument name is a strong signal the argument should be `type: string`.

  no-sentinel-files: >
    Steps SHOULD NOT use sentinel placeholder files (e.g., writing a `NONE.md` or
    `EMPTY.md` file to satisfy a required `file_path` output when the real result is
    "nothing to report") to work around the rule that `file_path` outputs cannot be
    empty. If a step's output is a list that can legitimately be empty, the output
    SHOULD be `type: string` (containing a narrative summary that naturally handles
    the empty case) rather than `type: file_path` with a placeholder file. Sentinel
    files leave stray artifacts on disk, confuse downstream steps that treat every
    output path as a real file, and mislead reviewers. Exception: a sentinel file
    MAY be used when the step genuinely needs a filesystem artifact a later step
    will read and parse (e.g., a manifest with "no items" semantics baked into its
    schema) — but the common "required output can't be empty" workaround is not a
    sufficient reason.

  step-visibility-boundary: >
    A step's instructions MUST NOT reference information from steps that have not yet
    run in the same workflow, including steps from other workflows in the same job.
    The executing agent only has access to outputs from earlier steps in the current
    workflow execution. Instructions that say "as defined in the implement step" or
    "use the output from the test step" are only valid if those steps precede the
    current step in the same workflow. Cross-workflow references MUST use `sub_workflow`
    or shared `step_arguments` — not prose references to another workflow's steps.

examples:
  - path: "../../jobs/job.schema.json"
    description: "The authoritative JSON Schema — defines all valid structural forms."
  - path: "../../standard_jobs/deepwork_jobs/templates/job.yml.example"
    description: "Complete competitive research job showing step_arguments, workflows, reviews, and data flow."
  - path: "../../standard_jobs/deepwork_jobs/templates/job.yml.template"
    description: "Canonical template showing all supported fields with placeholder comments."

references:
  - path: "../../../../doc/job_yml_guidance.md"
    description: "Behavioral impact of every job.yml field — what each field does at runtime."
  - path: "../../standard_jobs/deepwork_jobs/templates/step_instruction.md.template"
    description: "Expected structure for step instruction files (Objective, Task, Output Format, Quality Criteria)."
  - path: "../../standard_jobs/deepwork_jobs/research_report_job_best_practices.md"
    description: "Design patterns for report-authoring jobs (five-phase pattern, dataroom convention)."
