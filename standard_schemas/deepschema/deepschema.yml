summary: DeepSchema definition files that describe file-level schemas with requirements, validation, and review generation.

instructions: |
  DeepSchema files define rich schemas for other files. Named schemas live in
  .deepwork/schemas/<name>/deepschema.yml. Anonymous schemas are placed alongside
  their target file as .deepschema.<filename>.yml. All keys are optional but
  a schema without requirements or matchers has no enforcement effect.


matchers:
  - "**/deepschema.yml"
  - "**/.deepschema.*.yml"

json_schema_path: "deepschema_schema.json"

requirements:
  requirements-use-rfc-2119: "Requirements MUST use RFC 2119 keywords (MUST, SHOULD, MAY, etc.) to indicate enforcement level."
  requirements-filesystem-verifiable: "Each requirement MUST be verifiable by examining files on the filesystem. Requirements about processes, user behavior, or context not present in files SHOULD be in the instructions section instead."
  matchers-for-named: "Named DeepSchemas SHOULD include matchers so they can match files for review generation."
  summary-for-named: "Named DeepSchemas SHOULD include a summary for discoverability."
  valid-parent-refs: "Any schema listed in parent_deep_schemas MUST reference an existing named schema."
  verification-commands-safe: "Commands in verification_bash_command MUST NOT modify the file or have destructive side effects."
  json-schema-path-valid: "If json_schema_path is set, it MUST point to a valid JSON Schema file relative to the schema directory."
  examples-have-descriptions: "Each entry in examples SHOULD have both a path and a description."
  references-have-descriptions: "Each entry in references SHOULD have both a path and a description."
  no-structural-requirements: "Requirements MUST NOT restate constraints that are already enforced by the schema's json_schema_path or verification_bash_command. This includes syntactic validity (e.g., 'must be valid JSON'), field types (e.g., 'must be an array of strings'), allowed enum values, required fields, and structural shape. These SHOULD be expressed in the JSON Schema file. Requirements SHOULD focus on semantic rules, behavioral gotchas, and cross-field concerns that JSON Schema cannot express."
  req-ids-in-comments: "Requirement IDs (e.g., 'LA-REQ-007.4', 'JOBS-REQ-002.1') MUST be placed in YAML comments above the requirement entry, NOT inside the requirement body text. Including the ID in the body pollutes the prompt sent to the reviewer agent and adds noise without informational value. EXCEPTION: when the requirement itself is about referencing or producing a specific ID (e.g., a requirement that says 'the output MUST cite REQ-X'), the ID may appear in the body because it is functionally part of the rule."
